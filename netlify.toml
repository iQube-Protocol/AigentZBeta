# Netlify configuration for AigentZBeta monorepo
# This builds the thin client from apps/theqriptopian-web

[build]
  base = "apps/theqriptopian-web"
  publish = "dist"
  command = "npm install --legacy-peer-deps && cd ../../ && npm run build:packages && cd apps/theqriptopian-web && npm run build"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"
  NODE_ENV = "production"
  NETLIFY_USE_YARN = "false"
  NETLIFY_USE_PNPM = "false"
  NETLIFY_USE_NPM = "true"
  # API URLs for thin client (injected at build time by Vite)
  VITE_AIGENTIQ_API_URL = "https://dev-beta.aigentz.me"
  VITE_AIGENT_API_URL = "https://dev-beta.aigentz.me"
  VITE_API_URL = "https://dev-beta.aigentz.me"

# Edge Functions for SmartTriad embeds
[[edge_functions]]
  function = "embed-headers"
  path = "/triad/embed/*"

# Proxy /api/* requests to Amplify backend (prevents CORS issues and relative URL bugs)
[[redirects]]
  from = "/api/*"
  to = "https://dev-beta.aigentz.me/api/:splat"
  status = 200
  force = true

# SPA fallback (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
