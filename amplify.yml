version: 1

frontend:
  phases:
    preBuild:
      commands:
        - echo "Installing Node.js 20.18.0..."
        - nvm install 20.18.0
        - nvm use 20.18.0
        - node --version
        - echo "Installing dependencies..."
        - npm ci

        # Issue 3 dependency (Ghostscript) — AL2023 uses dnf (yum may be a shim)
        - echo "Installing Ghostscript..."
        - sudo dnf install -y ghostscript || sudo yum install -y ghostscript
        - gs --version
    build:
      commands:
        - echo "Creating .env.production (no indentation / safe parsing)..."
        - rm -f .env.production

        # Write only the exact vars we want, without whitespace issues.
        # (AWS recommended pattern for SSR env access is writing env vars into .env.production before build)
        - env | grep -E '^(PAYPAL_CLIENT_ID|PAYPAL_CLIENT_SECRET|PAYPAL_MODE|SUPABASE_URL|SUPABASE_SERVICE_ROLE_KEY|SUPABASE_ANON_KEY|CODEX_MASTER_KEY|AUTONOMYS_API_KEY|OPENAI_API_KEY|NEXTAUTH_URL|FIO_API_ENDPOINT|FIO_CHAIN_ID|FIO_SYSTEM_PUBLIC_KEY|FIO_SYSTEM_PRIVATE_KEY|FIO_MOCK_MODE|AGENT_KEY_ENCRYPTION_SECRET|TREASURY_PRIVATE_KEY|NEXT_PUBLIC_)=' >> .env.production || true

        # Hard fail if paypal creds missing in build container
        - node -e "if(!process.env.PAYPAL_CLIENT_ID||!process.env.PAYPAL_CLIENT_SECRET){console.error('Missing PAYPAL env vars in Amplify build env');process.exit(1)}"

        - echo ".env.production created. Building Next.js..."
        - npm run build

        - echo "Copying .env.production into standalone bundle..."
        - cp .env.production .next/standalone/.env.production || true

        - echo "Patching standalone server.js to load dotenv at runtime..."
        - node scripts/patch-standalone-dotenv.js

  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
