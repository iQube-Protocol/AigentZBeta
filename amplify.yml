version: 1

frontend:
  phases:
    preBuild:
      commands:
        - echo "Installing Node.js 20.18.0..."
        - nvm install 20.18.0
        - nvm use 20.18.0
        - node --version
        - echo "Installing dependencies..."
        - npm ci

        # Issue 3 dependency (Ghostscript) — AL2023 uses dnf (yum may be a shim)
        - echo "Installing Ghostscript..."
        - sudo dnf install -y ghostscript || sudo yum install -y ghostscript
        - gs --version
    build:
      commands:
        - echo "Creating .env.production with required SSR env vars..."
        - rm -f .env.production

        # Write the keys explicitly (even if empty) so we can detect missing injection
        - printf "PAYPAL_MODE=%s\n" "${PAYPAL_MODE}" >> .env.production
        - printf "PAYPAL_CLIENT_ID=%s\n" "${PAYPAL_CLIENT_ID}" >> .env.production
        - printf "PAYPAL_CLIENT_SECRET=%s\n" "${PAYPAL_CLIENT_SECRET}" >> .env.production
        - printf "SUPABASE_URL=%s\n" "${SUPABASE_URL}" >> .env.production
        - printf "SUPABASE_SERVICE_ROLE_KEY=%s\n" "${SUPABASE_SERVICE_ROLE_KEY}" >> .env.production
        - printf "SUPABASE_ANON_KEY=%s\n" "${SUPABASE_ANON_KEY}" >> .env.production
        - printf "CODEX_MASTER_KEY=%s\n" "${CODEX_MASTER_KEY}" >> .env.production
        - printf "AUTONOMYS_API_KEY=%s\n" "${AUTONOMYS_API_KEY}" >> .env.production
        - printf "NEXTAUTH_URL=%s\n" "${NEXTAUTH_URL}" >> .env.production
        - printf "OPENAI_API_KEY=%s\n" "${OPENAI_API_KEY}" >> .env.production
        - printf "FIO_API_ENDPOINT=%s\n" "${FIO_API_ENDPOINT}" >> .env.production
        - printf "FIO_CHAIN_ID=%s\n" "${FIO_CHAIN_ID}" >> .env.production
        - printf "FIO_SYSTEM_PUBLIC_KEY=%s\n" "${FIO_SYSTEM_PUBLIC_KEY}" >> .env.production
        - printf "FIO_SYSTEM_PRIVATE_KEY=%s\n" "${FIO_SYSTEM_PRIVATE_KEY}" >> .env.production
        - printf "FIO_MOCK_MODE=%s\n" "${FIO_MOCK_MODE}" >> .env.production
        - printf "AGENT_KEY_ENCRYPTION_SECRET=%s\n" "${AGENT_KEY_ENCRYPTION_SECRET}" >> .env.production
        - printf "TREASURY_PRIVATE_KEY=%s\n" "${TREASURY_PRIVATE_KEY}" >> .env.production

        # add all NEXT_PUBLIC_ vars too (AWS docs recommend this pattern for SSR env availability)
        - env | grep -E '^NEXT_PUBLIC_' >> .env.production || true

        # SAFE DIAGNOSTIC: print only keys + whether empty, never values
        - echo "=== .env.production keys + empty-check (REDACTED) ==="
        - node - <<'NODE'
          const fs = require('fs');
          const s = fs.readFileSync('.env.production','utf8').trim().split('\n').filter(Boolean);
          for (const line of s) {
            const [k,v=''] = line.split('=');
            console.log(`${k}=${v ? '[SET]' : '[EMPTY]'}`);
          }
          NODE

        # Hard fail if PayPal creds missing
        - node -e "if(!process.env.PAYPAL_CLIENT_ID||!process.env.PAYPAL_CLIENT_SECRET){console.error('PAYPAL env vars missing in build env');process.exit(1)}"

        - echo ".env.production created. Building Next.js..."
        - npm run build

        - echo "Copying .env.production into standalone bundle..."
        - cp .env.production .next/standalone/.env.production || true

        - echo "Patching standalone server.js to load dotenv at runtime..."
        - node <<'NODE'
          const fs = require('fs');
          const p = '.next/standalone/server.js';
          if (!fs.existsSync(p)) process.exit(0);
          let s = fs.readFileSync(p, 'utf8');
          const inject = "require('dotenv').config({ path: __dirname + '/.env.production' });\n";
          if (!s.startsWith("require('dotenv')")) fs.writeFileSync(p, inject + s);
          NODE

  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
