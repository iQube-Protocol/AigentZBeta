version: 1

frontend:
  phases:
    preBuild:
      commands:
        - echo "Installing Node.js 20.18.0..."
        - nvm install 20.18.0
        - nvm use 20.18.0
        - node --version
        - echo "Configuring npm network retries..."
        - npm config set fetch-retries 5
        - npm config set fetch-retry-factor 2
        - npm config set fetch-retry-mintimeout 20000
        - npm config set fetch-retry-maxtimeout 120000
        - npm config set prefer-offline true
        - npm config set audit false
        - npm config set fund false
        - echo "Installing dependencies..."
        - npm install --legacy-peer-deps --include=optional

        # Issue 3 dependency (Ghostscript) — AL2023 uses dnf (yum may be a shim)
        - echo "Installing Ghostscript..."
        - sudo dnf install -y ghostscript || sudo yum install -y ghostscript
        - gs --version
        
        # Install Sharp for Linux x64 platform
        - echo "Installing Sharp for Linux..."
        - npm install --os=linux --cpu=x64 sharp
    build:
      commands:
        # CONSTITUTIONAL GATE — fail the deploy on any NEW persona-spine
        # violation (persona-unaware client fetch). Runs first, before the
        # expensive build. Identity is foundational; a break here compounds
        # through every gate/receipt/grant downstream. See CLAUDE.md →
        # "Client-side spine fetches" and scripts/check-persona-spine.mjs.
        - echo "=== Persona-spine gate ==="
        - node scripts/check-persona-spine.mjs

        - echo "Creating .env.production with required SSR env vars..."
        - rm -f .env.production

        # Use Node.js to write .env.production because Amplify env vars are accessible to Node.js but not shell
        - node scripts/create-env-production.js

        # Add backend version for debugging
        - echo "Setting BACKEND_VERSION..."
        - export BACKEND_VERSION="${AWS_BRANCH:-unknown}-${AWS_COMMIT_ID:-$(git rev-parse --short HEAD)}"
        - echo "BACKEND_VERSION=$BACKEND_VERSION" >> .env.production
        
        # Cache busting - force fresh build
        - echo "Busting caches..."
        - rm -rf .next/cache
        - rm -rf node_modules/.cache

        # SAFE DIAGNOSTIC: print only keys + whether empty, never values
        - echo "=== .env.production keys + empty-check (REDACTED) ==="
        - node scripts/check-env-production.js

        # Hard fail if PayPal creds missing
        - node -e "if(!process.env.PAYPAL_CLIENT_ID||!process.env.PAYPAL_CLIENT_SECRET){console.error('PAYPAL env vars missing in build env');process.exit(1)}"

        - echo ".env.production created. Building Next.js..."
        # Next 15 build memory. Empirically on the CURRENT (small) Amplify build
        # instance no single heap value works — the instance itself is the limit:
        #   3072: compile is FLAKY — sometimes fits, sometimes OOMs mid-compile
        #         (V8 "Ineffective mark-compacts"); Next 15 compile peaks ~3.2 GB.
        #   4096/6144: compile reliable, but then `spawn ENOMEM` — the ~4 GB
        #         parent can't fork the page-data worker within the instance RAM.
        # 6144: comfortable compile headroom (~2x Next 15's ~3.2GB peak) on the
        # enlarged Amplify build instance. Parent (~6GB) + page-data worker fork
        # still sit well under a 16GB instance, so no spawn ENOMEM. Kept below
        # the instance ceiling so the fork always has room; if a future build
        # needs more, raise the instance tier rather than the heap past ~half of
        # instance RAM (that reintroduces the fork squeeze).
        - export NODE_OPTIONS="--max-old-space-size=6144"
        - export NEXT_PRIVATE_BUILD_WORKER=1
        - npm run build

        - echo "Copying .env.production into standalone bundle..."
        - cp .env.production .next/standalone/.env.production || true

        - echo "Patching standalone server.js to load dotenv at runtime..."
        - node scripts/patch-standalone-dotenv.js

        # Amplify Hosting SSR compute has a HARD 220 MB (230686720 byte)
        # uncompressed bundle limit — not an app-configurable quota (AWS docs +
        # aws-amplify/amplify-hosting#3841/#3863/#3647/#3699/#3980 confirm the
        # same literal byte value is a platform ceiling). Next's file tracing
        # conservatively bundles native binaries for platforms other than the
        # one Amplify's Lambda actually runs (linux x64 glibc) into
        # .next/standalone/node_modules. Deleting the non-runtime platform
        # variants AFTER build, directly on the packaged filesystem, is AWS's
        # own documented remedy for this error (troubleshooting-ssr-deployment)
        # and — unlike next.config.js outputFileTracingExcludes on a per-route
        # key — is not subject to any cross-route include/dedupe semantics:
        # bytes removed here are gone from the artifact, full stop.
        - echo "=== .next/standalone size BEFORE native-binary cleanup ==="
        - du -sh .next/standalone 2>/dev/null || true
        - echo "Removing non-linux-x64-gnu native binaries (build-only; unused at Amplify SSR runtime)..."
        - find .next/standalone/node_modules/@next -maxdepth 1 -type d -name "swc-*" ! -name "swc-linux-x64-gnu" -exec rm -rf {} + 2>/dev/null || true
        - find .next/standalone/node_modules/@swc -maxdepth 1 -type d -name "core-*" ! -name "core-linux-x64-gnu" -exec rm -rf {} + 2>/dev/null || true
        - find .next/standalone/node_modules/@esbuild -maxdepth 1 -type d ! -name "linux-x64" -exec rm -rf {} + 2>/dev/null || true
        - find .next/standalone/node_modules/@img -maxdepth 1 -type d \( -name "sharp-*" -o -name "*-libvips-*" \) ! -name "sharp-linux-x64" ! -name "sharp-libvips-linux-x64" -exec rm -rf {} + 2>/dev/null || true
        - find .next/standalone/node_modules/@napi-rs -maxdepth 1 -type d -name "canvas-*" ! -name "canvas-linux-x64-gnu" -exec rm -rf {} + 2>/dev/null || true
        # Next's file tracing already yields a minimal node_modules, so the
        # native-binary sweep above reclaims little on its own. The reliable,
        # zero-runtime-risk headroom is DEBUG/DEV artifacts the SSR runtime never
        # loads: source maps (*.map) across the whole .next tree, and any type
        # declarations / package docs that slipped into the traced node_modules.
        # None are require()d at runtime — deleting them cannot change behaviour.
        - echo "Removing source maps + non-runtime dev artifacts (never loaded at SSR runtime)..."
        - find .next -type f -name "*.map" -delete 2>/dev/null || true
        - find .next/standalone/node_modules -type f \( -name "*.d.ts" -o -name "*.md" -o -name "*.markdown" -o -iname "readme*" -o -iname "license*" -o -iname "licence*" -o -iname "changelog*" -o -name "*.map" \) -delete 2>/dev/null || true
        # Test/doc/example DIRECTORIES + build-meta files that npm installs into
        # every package but the SSR runtime never require()s. Module resolution
        # uses package.json main/exports → dist/lib, never these. This is the
        # battle-tested "modclean-safe" set; deleting it cannot change runtime
        # behaviour and reclaims several MB — the reliable headroom under the
        # 230686720-byte cap when the file-level sweep above isn't enough
        # (2026-07-21: the artifact was ~260 KB over even after that sweep).
        - echo "Removing test/doc/example dirs + build-meta from node_modules (never loaded at SSR runtime)..."
        - find .next/standalone/node_modules -type d \( -name test -o -name tests -o -name __tests__ -o -name example -o -name examples -o -name doc -o -name docs -o -name coverage -o -name .nyc_output -o -name .github -o -name .idea \) -prune -exec rm -rf {} + 2>/dev/null || true
        - find .next/standalone/node_modules -type f \( -name "*.flow" -o -name "*.coffee" -o -name "*.ts.map" -o -name ".eslintrc*" -o -name ".editorconfig" -o -name ".npmignore" -o -name ".travis.yml" -o -name "*.tsbuildinfo" -o -name ".DS_Store" \) -delete 2>/dev/null || true
        - echo "=== .next/standalone size AFTER native-binary + dev-artifact cleanup ==="
        - du -sh .next/standalone 2>/dev/null || true
        - echo "=== .next total size AFTER cleanup ==="
        - du -sh .next 2>/dev/null || true

  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      # Temporarily disable caching to force fresh build
      # - node_modules/**/*
      # - .next/cache/**/*
