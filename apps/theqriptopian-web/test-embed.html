<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartTriad Embed Test</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #050816;
      font-family: system-ui, -apple-system, sans-serif;
      color: white;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    h1 {
      color: #60a5fa;
      margin-bottom: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-top: 20px;
    }
    .embed-container {
      border: 2px solid #374151;
      border-radius: 8px;
      overflow: hidden;
      background: #1f2937;
    }
    .embed-header {
      padding: 12px 16px;
      background: #111827;
      border-bottom: 1px solid #374151;
      font-weight: 600;
    }
    iframe {
      width: 100%;
      height: 600px;
      border: none;
      display: block;
    }
    .status {
      padding: 8px 12px;
      background: #065f46;
      color: #d1fae5;
      border-radius: 4px;
      display: inline-block;
      font-size: 12px;
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 SmartTriad Embed Test</h1>
    <p>Testing all 4 embed routes locally</p>
    
    <div class="grid">
      <div class="embed-container">
        <div class="embed-header">
          Wallet Embed <span class="status">✓ Active</span>
        </div>
        <iframe src="http://localhost:8080/triad/embed/wallet"></iframe>
      </div>
      
      <div class="embed-container">
        <div class="embed-header">
          Codex Embed <span class="status">✓ Active</span>
        </div>
        <iframe src="http://localhost:8080/triad/embed/codex?tab=scrolls"></iframe>
      </div>
      
      <div class="embed-container">
        <div class="embed-header">
          Admin Dashboard <span class="status">✓ Active</span>
        </div>
        <iframe src="http://localhost:8080/triad/admin"></iframe>
      </div>
      
      <div class="embed-container">
        <div class="embed-header">
          Codex Manager <span class="status">✓ Active</span>
        </div>
        <iframe src="http://localhost:8080/triad/admin/codex"></iframe>
      </div>
    </div>
  </div>
</body>
</html>
