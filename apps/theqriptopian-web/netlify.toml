[build]
  base = "/"
  command = "npm install --legacy-peer-deps && cd apps/theqriptopian-web && npm run build"
  publish = "apps/theqriptopian-web/dist"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF ."

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"
  # Disable Python detection
  NETLIFY_USE_YARN = "false"
  NETLIFY_USE_PNPM = "false"
  # Force Node.js only
  NODE_ENV = "production"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
