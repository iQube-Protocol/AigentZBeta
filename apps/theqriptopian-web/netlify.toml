[build]
  base = "/"
  command = "npm install --legacy-peer-deps && npm run build --workspace=@agentiq/smartwallet && cd apps/theqriptopian-web && npm run build"
  publish = "apps/theqriptopian-web/dist"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF ."

[build.environment]
  NODE_VERSION = "20"
  PYTHON_VERSION = "3.11"
  NPM_FLAGS = "--legacy-peer-deps"
  # Disable Python detection
  NETLIFY_USE_YARN = "false"
  NETLIFY_USE_PNPM = "false"
  # Force Node.js only
  NODE_ENV = "production"
  # API URLs for thin client
  VITE_AIGENTIQ_API_URL = "https://dev-beta.aigentz.me"
  VITE_AIGENT_API_URL = "https://dev-beta.aigentz.me"
  VITE_API_URL = "https://dev-beta.aigentz.me"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
