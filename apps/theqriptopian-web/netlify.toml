[build]
  publish = "dist"
  command = "npm install --include=dev --workspaces=false --no-package-lock && npm run build"

[build.environment]
  NPM_FLAGS = "--include=dev"

[[redirects]]
  from = "/api/*"
  to = "https://dev-beta.aigentz.me/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
