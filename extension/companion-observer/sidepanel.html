<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>metaMe Companion</title>
    <style>
      /*
       * (2026-07-23 revision) NOT hosted via chrome.sidePanel anymore — that
       * API docks into the browser window and pushes/reflows the current
       * page's viewport to make room, which reads as "resizing my page,"
       * not "an overlay on top of it." This same document is now opened as
       * a separate floating popup window instead (see popup.js's
       * `openOrFocusCompanionWindow`), positioned at the screen edge so it
       * sits beside the operator's page without touching its layout.
       *
       * This page's only job is still to iframe the real Companion page
       * (dev-beta.aigentz.me/triad/embed/companion, already narrowed to
       * match this window's width — see
       * app/(embed)/triad/embed/companion/page.tsx) — a plain popup window
       * can't point `url:` at an external https:// origin directly in a way
       * that keeps the CSP frame-ancestors allowlist narrow, so this local
       * extension document (chrome-extension://<pinned-id>/sidepanel.html,
       * already the one origin allowlisted in
       * configs/embed/policy.v1.json) is the iframe host either way.
       */
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #020617;
      }
      iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
      }
    </style>
  </head>
  <body>
    <iframe id="companionFrame" title="metaMe Companion"></iframe>
    <script src="constants.js"></script>
    <script src="sidepanel.js"></script>
  </body>
</html>
