<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>metaMe Companion</title>
    <style>
      /*
       * Chrome's Side Panel API only accepts a LOCAL extension page as
       * `side_panel.default_path` — it cannot point directly at an external
       * https:// URL. This page's only job is to iframe the real Companion
       * page (dev-beta.aigentz.me/triad/embed/companion, already narrowed to
       * match this panel's width — see app/(embed)/triad/embed/companion/page.tsx)
       * so the operator's actual Companion + wallet UI renders inside Chrome's
       * native docked side panel, beside whatever tab they're on, instead of
       * navigating them to a new tab and losing their place.
       */
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #020617;
      }
      iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
      }
    </style>
  </head>
  <body>
    <iframe id="companionFrame" title="metaMe Companion"></iframe>
    <script src="constants.js"></script>
    <script src="sidepanel.js"></script>
  </body>
</html>
