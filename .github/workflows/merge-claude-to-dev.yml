name: Merge claude branch to dev

on:
  push:
    branches:
      - 'claude/**'

jobs:
  merge:
    name: Auto-merge to dev
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge claude branch into dev
        run: |
          git checkout dev
          git merge --ff-only origin/${{ github.ref_name }} || git merge origin/${{ github.ref_name }} --no-edit
          git push origin dev
