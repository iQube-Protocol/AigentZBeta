name: Merge claude branch to dev

on:
  push:
    branches:
      - 'claude/**'

jobs:
  merge:
    name: Auto-merge to dev
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge claude branch into dev
        # CLAUDE.md merge-message rule: a merge to dev must NAME what it
        # carries — never git's default "Merge remote-tracking branch …"
        # (--no-edit). The fast-forward path keeps the original descriptive
        # commits; the merge-commit fallback now titles itself with the
        # session branch + its head commit subject, so the Amplify deploy
        # history reads as "what shipped", not boilerplate.
        run: |
          git checkout dev
          SUBJECT="$(git log -1 --pretty=%s origin/${{ github.ref_name }})"
          git merge --ff-only origin/${{ github.ref_name }} || \
            git merge origin/${{ github.ref_name }} -m "merge ${{ github.ref_name }}: ${SUBJECT}"
          git push origin dev
