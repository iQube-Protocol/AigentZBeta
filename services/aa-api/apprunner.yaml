version: 1.0
runtime: nodejs18

build:
  commands:
    pre-build:
      - echo "Skipping pre-build"
    build:
      - npm ci
      - npm run build
    post-build:
      - echo "Build complete"

run:
  runtime-version: 18
  command: npm start
  network:
    port: 8080
  env:
    - name: NODE_ENV
      value: production
